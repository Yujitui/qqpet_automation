services:
  postgres:
    image: postgres:16-alpine
    container_name: qqpet-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-qqpet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/initdb.d:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - qqpet-network
    expose:
      - "5432"

  backend:
    build: ./server
    container_name: qqpet-backend
    ports:
      - "${SERVER_PORT:-8000}:8000"
    env_file:
      - ./server/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/qqpet
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./server:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - qqpet-network

  adminer:
    image: adminer
    container_name: qqpet-adminer
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - qqpet-network
    profiles:
      - debug

volumes:
  postgres_data:

networks:
  qqpet-network:
    driver: bridge
