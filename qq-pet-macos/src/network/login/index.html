<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QQ宠物 - 登录</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: white;
      border-radius: 16px;
      padding: 32px;
      width: 340px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo h1 {
      font-size: 24px;
      color: #333;
      margin-bottom: 8px;
    }
    .logo p {
      font-size: 13px;
      color: #888;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .btn-secondary {
      background: transparent;
      color: #667eea;
      margin-top: 8px;
    }
    .btn-secondary:hover {
      background: rgba(102, 126, 234, 0.05);
    }
    .divider {
      display: flex;
      align-items: center;
      margin: 16px 0;
    }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #eee;
    }
    .divider span {
      padding: 0 12px;
      font-size: 12px;
      color: #aaa;
    }
    .error {
      background: #fff5f5;
      color: #c53030;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .error.show { display: block; }
    .success {
      background: #f0fff4;
      color: #276749;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .success.show { display: block; }
    .server-config {
      margin-bottom: 8px;
    }
    .server-config small {
      color: #888;
      font-size: 11px;
    }
    .toggle {
      text-align: center;
      margin-top: 12px;
    }
    .toggle a {
      color: #667eea;
      text-decoration: none;
      font-size: 13px;
      cursor: pointer;
    }
    .toggle a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>🐧 QQ宠物</h1>
      <p>怀旧服 v1.6.1</p>
    </div>

    <div id="error" class="error"></div>
    <div id="success" class="success"></div>

    <form id="loginForm" style="display: block;">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="loginUsername" placeholder="请输入用户名" required>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPassword" placeholder="请输入密码" required>
      </div>
      <div class="form-group server-config">
        <label>服务器地址</label>
        <input type="text" id="serverUrl" placeholder="http://localhost:8000">
        <small>默认为本地服务器，远程登录请修改地址</small>
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">登录</button>
      <div class="toggle">
        <a id="showRegister">没有账号？立即注册</a>
      </div>
    </form>

    <form id="registerForm" style="display: none;">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="regUsername" placeholder="请输入用户名" required>
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="regPassword" placeholder="请输入密码" required>
      </div>
      <div class="form-group">
        <label>确认密码</label>
        <input type="password" id="regPassword2" placeholder="请再次输入密码" required>
      </div>
      <div class="form-group server-config">
        <label>服务器地址</label>
        <input type="text" id="regServerUrl" placeholder="http://localhost:8000">
      </div>
      <button type="submit" class="btn btn-primary" id="registerBtn">注册</button>
      <div class="toggle">
        <a id="showLogin">已有账号？立即登录</a>
      </div>
    </form>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const errorDiv = document.getElementById('error');
    const successDiv = document.getElementById('success');
    const showRegister = document.getElementById('showRegister');
    const showLogin = document.getElementById('showLogin');
    const loginBtn = document.getElementById('loginBtn');
    const registerBtn = document.getElementById('registerBtn');

    async function init() {
      const serverUrl = await window.loginAPI.getServerUrl();
      document.getElementById('serverUrl').value = serverUrl;
      document.getElementById('regServerUrl').value = serverUrl;
    }
    init();

    function showError(msg) {
      errorDiv.textContent = msg;
      errorDiv.classList.add('show');
      successDiv.classList.remove('show');
    }

    function showSuccess(msg) {
      successDiv.textContent = msg;
      successDiv.classList.add('show');
      errorDiv.classList.remove('show');
    }

    function setLoading(btn, loading) {
      if (loading) {
        btn.disabled = true;
        btn.textContent = btn.id === 'loginBtn' ? '登录中...' : '注册中...';
      } else {
        btn.disabled = false;
        btn.textContent = btn.id === 'loginBtn' ? '登录' : '注册';
      }
    }

    showRegister.addEventListener('click', () => {
      loginForm.style.display = 'none';
      registerForm.style.display = 'block';
      errorDiv.classList.remove('show');
      successDiv.classList.remove('show');
    });

    showLogin.addEventListener('click', () => {
      loginForm.style.display = 'block';
      registerForm.style.display = 'none';
      errorDiv.classList.remove('show');
      successDiv.classList.remove('show');
    });

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      setLoading(loginBtn, true);
      errorDiv.classList.remove('show');

      try {
        const result = await window.loginAPI.login({
          username: document.getElementById('loginUsername').value,
          password: document.getElementById('loginPassword').value,
          serverUrl: document.getElementById('serverUrl').value,
        });

        if (result.success) {
          showSuccess('登录成功，正在启动...');
        } else {
          showError(result.message);
        }
      } catch (err) {
        showError(err.message || '登录失败');
      } finally {
        setLoading(loginBtn, false);
      }
    });

    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('regPassword').value;
      const password2 = document.getElementById('regPassword2').value;

      if (password !== password2) {
        showError('两次输入的密码不一致');
        return;
      }

      setLoading(registerBtn, true);
      errorDiv.classList.remove('show');

      try {
        const result = await window.loginAPI.register({
          username: document.getElementById('regUsername').value,
          password: password,
          serverUrl: document.getElementById('regServerUrl').value,
        });

        if (result.success) {
          showSuccess('注册成功！请登录');
          setTimeout(() => showLogin.click(), 1500);
        } else {
          showError(result.message);
        }
      } catch (err) {
        showError(err.message || '注册失败');
      } finally {
        setLoading(registerBtn, false);
      }
    });
  </script>
</body>
</html>
